services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: traffic-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - API_TITLE=Traffic System Brain
      - API_VERSION=1.0.0
    volumes:
      - ./backend/traffic_brain.db:/app/backend/traffic_brain.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Reads NEXT_PUBLIC_BACKEND_URL from your .env file
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: traffic-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  detector:
    build:
      context: .
      dockerfile: traffic_engine/Dockerfile
    container_name: traffic-detector
    env_file:
      - .env
    environment:
      - HEADLESS=true
      - BACKEND_URL=http://traffic-backend:8000
      - TRAFFIC_PHONE_IP=${TRAFFIC_PHONE_IP}
      - TRAFFIC_PHONE_PORT=${TRAFFIC_PHONE_PORT}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    restart: always

networks:
  default:
    name: traffic-network
