services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: traffic-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./traffic_brain.db
      - API_TITLE=Traffic System Brain
      - API_VERSION=1.0.0
    volumes:
      - ./backend/traffic_brain.db:/app/backend/traffic_brain.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: traffic-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: always

networks:
  default:
    name: traffic-network
